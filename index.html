<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DYON</title>
<meta name="description" content="vermelho." />

<meta property="og:title" content="DYON" />
<meta property="og:description" content="vermelho." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0A0A0A" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     EDITAR LINKS: vá até o objeto LINKS no fim do <script>
     ========================================================= */

  :root {
    --blood: #8B0000;
    --brick: #B22222;
    --cherry: #D72638;
    --wine: #5C0A11;
    --signal: #E63946;
    --black-abs: #0A0A0A;
    --black-smoke: #1C1C1C;
    --grey-lead: #3A3A3A;
    --offwhite: #F5F1EA;
    --leather: #8C7B6B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: var(--black-abs);
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--black-abs);
    color: var(--offwhite);
    overflow-x: hidden;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Glow vermelho central — vibe Barragán/Almodóvar */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, var(--blood) 0%, transparent 65%);
    border-radius: 50%;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.16; }
    50%      { transform: translate(-50%, -50%) scale(1.2); opacity: 0.26; }
  }

  /* Grain sutil */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
    opacity: 0.06;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  /* ─── TOP MARK ─── */
  .topmark {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--leather);
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(139, 0, 0, 0.3);
    margin-bottom: 60px;
  }

  .topmark .live {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topmark .live::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--cherry);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cherry);
    animation: blink 2.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: rise 1s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 18vw, 96px);
    letter-spacing: 16px;
    color: var(--offwhite);
    line-height: 0.9;
    text-indent: 16px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    color: var(--leather);
    margin-top: 18px;
    letter-spacing: 0.5px;
  }

  .season {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cherry);
    margin-top: 14px;
  }

  /* ─── ÚLTIMO LANÇAMENTO ─── */
  .release {
    margin-bottom: 64px;
    animation: rise 1.1s cubic-bezier(.22,1,.36,1) 0.15s both;
  }

  .release-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cherry);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .release-label::before,
  .release-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(139, 0, 0, 0.35);
  }

  .release-cover {
    aspect-ratio: 1 / 1;
    background:
      linear-gradient(135deg, rgba(139, 0, 0, 0.55), rgba(28, 28, 28, 0.95)),
      var(--black-smoke);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(139, 0, 0, 0.35);
  }

  /* ▼ QUANDO TIVER A CAPA: comente o background acima e descomente abaixo
  .release-cover {
    background-image: url('CAPA_AQUI.jpg');
    background-size: cover;
    background-position: center;
  }
  ▲ */

  /* ▼ Sua foto/capa ocupa a capa inteira automaticamente */
  .release-cover .release-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
  }

  /* Placeholder discreto que só aparece quando não tem imagem */
  .release-cover .placeholder-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 32px;
    color: var(--cherry);
    opacity: 0.4;
  }

  .release-cover .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border: 1px solid var(--cherry);
    z-index: 2;
  }
  .release-cover .corner.tl { top: 14px; left: 14px;   border-right: 0; border-bottom: 0; }
  .release-cover .corner.tr { top: 14px; right: 14px;  border-left: 0;  border-bottom: 0; }
  .release-cover .corner.bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; }
  .release-cover .corner.br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }

  .release-meta {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(139, 0, 0, 0.25);
  }

  .release-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--offwhite);
    line-height: 1;
  }

  .release-year {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--leather);
  }

  .release-platforms {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: rgba(139, 0, 0, 0.2);
    margin-top: 14px;
    border: 1px solid rgba(139, 0, 0, 0.2);
  }

  .release-platforms a {
    background: var(--black-abs);
    text-decoration: none;
    color: var(--offwhite);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 14px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.25s ease;
  }

  .release-platforms a:hover,
  .release-platforms a:focus-visible {
    background: var(--wine);
    color: var(--offwhite);
    outline: none;
  }

  .release-platforms a .arrow {
    color: var(--cherry);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
  }

  /* ─── SEÇÃO LINKS ─── */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cherry);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::before,
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(139, 0, 0, 0.35);
  }

  .links {
    display: flex;
    flex-direction: column;
  }

  .link-item {
    text-decoration: none;
    color: var(--offwhite);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 4px;
    border-bottom: 1px solid rgba(139, 0, 0, 0.18);
    transition: all 0.3s cubic-bezier(.22,1,.36,1);
    position: relative;
    animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  .link-item:nth-child(1) { animation-delay: 0.30s; }
  .link-item:nth-child(2) { animation-delay: 0.36s; }
  .link-item:nth-child(3) { animation-delay: 0.42s; }
  .link-item:nth-child(4) { animation-delay: 0.48s; }
  .link-item:nth-child(5) { animation-delay: 0.54s; }
  .link-item:nth-child(6) { animation-delay: 0.60s; }
  .link-item:nth-child(7) { animation-delay: 0.66s; }
  .link-item:nth-child(8) { animation-delay: 0.72s; }

  .link-item .left {
    display: flex;
    align-items: baseline;
    gap: 18px;
  }

  .link-item .num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--leather);
    letter-spacing: 2px;
    min-width: 24px;
  }

  .link-item .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--offwhite);
    transition: color 0.3s ease, letter-spacing 0.3s ease;
  }

  .link-item .arrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--leather);
    transition: all 0.3s ease;
  }

  .link-item:hover,
  .link-item:focus-visible {
    background: linear-gradient(90deg, rgba(139, 0, 0, 0.18), transparent 80%);
    padding-left: 14px;
    border-bottom-color: var(--blood);
    outline: none;
  }

  .link-item:hover .title,
  .link-item:focus-visible .title {
    color: var(--cherry);
    letter-spacing: 6px;
  }

  .link-item:hover .num {
    color: var(--cherry);
  }

  .link-item:hover .arrow {
    color: var(--cherry);
    transform: translateX(4px);
  }

  /* ─── FOOTER ─── */
  .footer {
    margin-top: 70px;
    padding-top: 28px;
    border-top: 1px solid rgba(139, 0, 0, 0.25);
    text-align: center;
  }

  .footer .footer-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 8px;
    color: var(--cherry);
    margin-bottom: 8px;
  }

  .footer .footer-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--grey-lead);
  }

  /* ─── responsivo ─── */
  @media (max-width: 380px) {
    .wrap { padding: 28px 18px 50px; }
    .name { font-size: 56px; letter-spacing: 12px; text-indent: 12px; }
    .link-item .title { font-size: 22px; letter-spacing: 3px; }
    .link-item:hover .title { letter-spacing: 4.5px; }
    .release-platforms a { font-size: 9px; padding: 12px 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Top mark -->
  <div class="topmark">
    <span class="live">Live</span>
    <span>2026</span>
  </div>

  <!-- ===========================================
       ÚLTIMO LANÇAMENTO
       =========================================== -->
  <section class="release">
    <p class="release-label">Novo</p>

    <div class="release-cover">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <!-- ▼ TROQUE A SRC ABAIXO PELA SUA FOTO/CAPA ▼
           Pode ser:
           - link da web (ex: https://i.imgur.com/abc.jpg)
           - arquivo local (ex: capa.jpg, se estiver na mesma pasta)
           Se quiser deixar sem foto por enquanto, apague a linha <img>
           e o placeholder elegante aparece. -->
      <img src="" alt="" class="release-img" onerror="this.style.display='none'" />

      <span class="placeholder-text">★</span>
    </div>

    <div class="release-meta">
      <span class="release-title">Nome da Faixa</span>
      <span class="release-year">2026 · Single</span>
    </div>

    <div class="release-platforms">
      <a href="#" data-link="spotify-track" target="_blank" rel="noopener">
        <span>Spotify</span><span class="arrow">→</span>
      </a>
      <a href="#" data-link="apple-track" target="_blank" rel="noopener">
        <span>Apple Music</span><span class="arrow">→</span>
      </a>
      <a href="#" data-link="ytmusic-track" target="_blank" rel="noopener">
        <span>YT Music</span><span class="arrow">→</span>
      </a>
      <a href="#" data-link="deezer-track" target="_blank" rel="noopener">
        <span>Deezer</span><span class="arrow">→</span>
      </a>
    </div>
  </section>

  <!-- ===========================================
       LINKS PRINCIPAIS
       =========================================== -->
  <p class="section-label">Caminhos</p>

  <nav class="links">

    <a class="link-item" href="#" data-link="youtube" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">01</span>
        <span class="title">YouTube</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="spotify" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">02</span>
        <span class="title">Spotify</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="apple-music" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">03</span>
        <span class="title">Apple Music</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="youtube-music" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">04</span>
        <span class="title">YouTube Music</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="deezer" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">05</span>
        <span class="title">Deezer</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="soundcloud" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">06</span>
        <span class="title">SoundCloud</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="instagram" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">07</span>
        <span class="title">Instagram</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="link-item" href="#" data-link="tiktok" target="_blank" rel="noopener">
      <span class="left">
        <span class="num">08</span>
        <span class="title">TikTok</span>
      </span>
      <span class="arrow">→</span>
    </a>

  </nav>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-mark">DYON</div>
  </footer>

</div>

<script>
  /* ====================================================
     COLE SEUS LINKS AQUI ↓
     Deixe '' (vazio) o que ainda não tiver.
     ==================================================== */
  const LINKS = {
    // Plataformas principais
    'youtube':         '',
    'spotify':         '',
    'apple-music':     '',
    'youtube-music':   '',
    'deezer':          '',
    'soundcloud':      '',
    'instagram':       '',
    'tiktok':          '',

    // Faixa específica do último lançamento
    'spotify-track':   '',
    'apple-track':     '',
    'ytmusic-track':   '',
    'deezer-track':    '',
  };

  document.querySelectorAll('[data-link]').forEach(el => {
    const key = el.getAttribute('data-link');
    if (LINKS[key]) el.setAttribute('href', LINKS[key]);
  });
</script>

</body>
</html>
